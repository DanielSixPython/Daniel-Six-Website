<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | danielsix.com</title>
</head>
<body>
    <h1>Checkout</h1>
    <button id="checkout-button">Checkout Now</button>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const checkoutBtn = document.getElementById('checkout-button');
        if (!checkoutBtn) return;

        checkoutBtn.onclick = async () => {
            console.log("Button clicked. Current URL:", window.location.href);
            
            try {
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = "Connecting...";

                // 1. Extract data from URL
                const urlParams = new URLSearchParams(window.location.search);
                const dataStr = urlParams.get('data'); 
                
                if (!dataStr) {
                    throw new Error(`No 'data' parameter found. URL is: ${window.location.search}`);
                }

                // 2. Parse Items (Handles: Name:PriceID:Qty,Name:PriceID:Qty)
                const cartData = dataStr.split(',').map(itemStr => {
                    const parts = itemStr.split(':');
                    if (parts.length < 3) throw new Error(`Invalid item format: ${itemStr}`);
                    return {
                        priceId: parts[1].trim(),
                        qty: parseInt(parts[2]) || 1
                    };
                });

                console.log("Cart data prepared:", cartData);

                // 3. POST to Cloudflare Function
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart: cartData })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server Error (${response.status}): ${errorText}`);
                }

                const result = await response.json();
                window.location.href = result.url;

            } catch (err) {
                console.error("Checkout failed:", err);
                alert("Error: " + err.message);
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = "Checkout Now";
            }
        };
    });
    </script>
</body>
</html>
