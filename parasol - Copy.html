    <script>
        // Use window.onload to ensure the DOM is fully ready
        window.onload = function() {
            updateCartLink();
        };

        function updateCartLink() {
            const cartLink = document.getElementById('nav-cart-link');
            if (!cartLink) return;

            const saved = localStorage.getItem('parasol_cart');
            if (saved) {
                const cart = JSON.parse(saved);
                if (cart.length > 0) {
                    const cartString = cart.map(i => i.productId + ':' + i.priceId + ':' + i.quantity).join(',');
                    cartLink.href = 'cart.html?data=' + encodeURIComponent(cartString);
                    return;
                }
            }
            cartLink.href = 'cart.html';
        }

        function addToCart(productId, priceId) {
            console.log("Adding item:", productId);
            
            // 1. Get Qty
            const input = document.getElementById('qty-' + productId);
            const quantity = input ? parseInt(input.value) : 1;

            // 2. Load Cart
            let cart = [];
            const saved = localStorage.getItem('parasol_cart');
            if (saved) cart = JSON.parse(saved);

            // 3. Update Cart
            const existing = cart.find(i => i.productId === productId);
            if (existing) {
                existing.quantity += quantity;
            } else {
                cart.push({ productId: productId, priceId: priceId, quantity: quantity });
            }

            // 4. Save
            localStorage.setItem('parasol_cart', JSON.stringify(cart));
            
            // 5. Update Link
            updateCartLink();

            // 6. Visual Feedback
            alert(productId + " added to cart!");
        }
    </script>
