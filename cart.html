<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | danielsix.com</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #eee; display: flex; justify-content: center; padding: 40px; }
        #cart-card { background: #2a2a2a; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #333; }
        .item-info { display: flex; flex-direction: column; }
        .item-name { font-weight: bold; color: #fff; }
        .item-qty { font-size: 0.9em; color: #888; }
        .actions { margin-top: 30px; display: flex; gap: 10px; flex-direction: column; }
        button { padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; transition: 0.2s; }
        #checkout-button { background-color: #6772e5; color: white; }
        #checkout-button:hover { background-color: #7782ed; }
        #clear-button { background-color: #444; color: #ccc; }
        #clear-button:hover { background-color: #555; color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin-top: 15px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div id="cart-card">
    <h2>Shopping Cart</h2>
    <div id="cart-items-list"></div>

    <div class="actions">
        <button id="checkout-button">Proceed to Checkout</button>
        <button id="clear-button">Clear Cart</button>
    </div>
    
    <div id="status"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const itemsList = document.getElementById('cart-items-list');
    const checkoutBtn = document.getElementById('checkout-button');
    const clearBtn = document.getElementById('clear-button');
    const statusDiv = document.getElementById('status');

    // 1. Get data from URL
    const urlParams = new URLSearchParams(window.location.search);
    const rawData = urlParams.get('data');

    if (!rawData || rawData.trim() === "") {
        itemsList.innerHTML = "<p style='text-align:center; padding: 20px;'>Your cart is empty.</p>";
        checkoutBtn.style.display = 'none';
        clearBtn.style.display = 'none';
        return;
    }

    // 2. Parse and Display Items (Format: Name:PriceID:Qty)
    const items = rawData.split(',').map(itemStr => {
        const parts = itemStr.split(':');
        return {
            name: parts[0].trim(),
            priceId: parts[1].trim(),
            qty: parseInt(parts[2]) || 1
        };
    });

    items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
            <div class="item-info">
                <span class="item-name">${item.name}</span>
                <span class="item-qty">Quantity: ${item.qty}</span>
            </div>
        `;
        itemsList.appendChild(div);
    });

    // 3. Clear Cart Logic
    clearBtn.onclick = () => {
        localStorage.removeItem('parasol_cart'); 
        window.location.href = 'parasol.html'; 
    };
    
    // 4. Checkout Logic
    checkoutBtn.onclick = async () => {
        try {
            checkoutBtn.disabled = true;
            checkoutBtn.innerText = "Connecting...";
            statusDiv.innerText = "Setting up your secure payment...";

            const response = await fetch('/create-checkout-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    cart: items.map(i => ({ priceId: i.priceId, qty: i.qty })) 
                })
            });

            const result = await response.json();
            if (result.url) {
                window.location.href = result.url;
            } else {
                throw new Error(result.error || "Server error");
            }
        } catch (err) {
            statusDiv.innerText = "Error: " + err.message;
            statusDiv.style.color = "#ff6b6b";
            checkoutBtn.disabled = false;
            checkoutBtn.innerText = "Proceed to Checkout";
        }
    };
});
</script>
</body>
</html>
