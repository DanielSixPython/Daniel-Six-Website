<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - danielsix.com</title>
</head>
<body>

    <button id="checkout-button">Checkout</button>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const checkoutBtn = document.getElementById('checkout-button');

        if (!checkoutBtn) {
            console.error("Button with ID 'checkout-button' not found.");
            return;
        }

        checkoutBtn.onclick = async () => {
            try {
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = "Connecting...";

                // 1. Get the data from the URL ?data=Name:PriceID:Qty
                const urlParams = new URLSearchParams(window.location.search);
                const rawData = urlParams.get('data'); 
                
                if (!rawData) {
                    throw new Error("No cart data found in the URL.");
                }

                // 2. Parse your specific format: Parasol-18:price_1TUd8FCkSiGjt6yM1CgAgJAP:1
                const parts = rawData.split(':');
                if (parts.length < 3) {
                    throw new Error("Cart data format is invalid.");
                }

                const cartData = [{
                    priceId: parts[1], // The middle part is your Stripe Price ID
                    qty: parseInt(parts[2]) || 1
                }];

                // 3. POST to your Cloudflare Function
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart: cartData })
                });

                // 4. Handle 404 or 500 errors properly
                if (!response.ok) {
                    const errorText = await response.text();
                    let errorMessage = "Server Error";
                    try {
                        const json = JSON.parse(errorText);
                        errorMessage = json.error || errorMessage;
                    } catch (e) {
                        errorMessage = errorText; 
                    }
                    throw new Error(errorMessage);
                }

                // 5. Redirect to Stripe Checkout
                const result = await response.json();
                window.location.href = result.url;

            } catch (err) {
                console.error("Checkout failed:", err);
                alert("Checkout Error: " + err.message);
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = "Checkout";
            }
        };
    });
    </script>
</body>
</html>
