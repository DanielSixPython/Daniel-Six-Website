<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | danielsix.com</title>
    <link rel="icon" href="data:,"> 
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        #checkout-container { text-align: center; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 12px 24px; font-size: 18px; cursor: pointer; background-color: #6772e5; color: white; border: none; border-radius: 4px; transition: background-color 0.2s; }
        button:disabled { background-color: #aab7c4; cursor: not-allowed; }
        #status { margin-top: 15px; color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <div id="checkout-container">
        <h2>Your Cart</h2>
        <p id="item-count">Loading cart details...</p>
        <button id="checkout-button">Proceed to Checkout</button>
        <div id="status"></div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const checkoutBtn = document.getElementById('checkout-button');
        const statusDiv = document.getElementById('status');
        const countMsg = document.getElementById('item-count');

        // 1. Extract and Parse Cart Data immediately on load
        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');

        if (!rawData) {
            countMsg.innerText = "No items found in cart.";
            checkoutBtn.style.display = 'none';
            return;
        }

        // Prepare the data for the POST request
        let cartData = [];
        try {
            cartData = rawData.split(',').map(item => {
                const parts = item.split(':');
                if (parts.length < 3) throw new Error("Malformed item data");
                return {
                    priceId: parts[1].trim(),
                    qty: parseInt(parts[2]) || 1
                };
            });
            countMsg.innerText = `Ready to checkout with ${cartData.length} item(s).`;
        } catch (e) {
            countMsg.innerText = "Error reading cart data.";
            checkoutBtn.disabled = true;
        }

        // 2. Handle the actual Checkout Click
        checkoutBtn.onclick = async () => {
            try {
                // UI Feedback
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = "Connecting to Stripe...";
                statusDiv.innerText = "Generating secure checkout session...";

                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart: cartData })
                });

                const result = await response.json();

                if (response.ok && result.url) {
                    // Redirect to Stripe
                    window.location.href = result.url;
                } else {
                    throw new Error(result.error || "Failed to create session");
                }

            } catch (err) {
                console.error("Checkout Error:", err);
                statusDiv.style.color = "red";
                statusDiv.innerText = "Error: " + err.message;
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = "Try Again";
            }
        };
    });
    </script>
</body>
</html>
