<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | danielsix.com</title>
</head>
<body>
    <h1>Checkout</h1>
    <button id="checkout-button">Checkout Now</button>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const checkoutBtn = document.getElementById('checkout-button');
        if (!checkoutBtn) return;

        checkoutBtn.onclick = async () => {
            console.log("Button clicked. Preparing cart data...");
            try {
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = "Connecting...";

                // 1. Get the data from the URL
                const urlParams = new URLSearchParams(window.location.search);
                const dataStr = urlParams.get('data'); 
                
                if (!dataStr) {
                    throw new Error("No cart data found in URL. Ensure the URL looks like: cart?data=Name:PriceID:Qty");
                }

                // 2. Parse multi-item format (e.g. Parasol-18:price_123:1,Parasol-12:price_456:1)
                const cartData = dataStr.split(',').map(itemStr => {
                    const parts = itemStr.split(':');
                    if (parts.length < 3) throw new Error("Invalid item format in URL");
                    return {
                        priceId: parts[1].trim(),
                        qty: parseInt(parts[2]) || 1
                    };
                });

                console.log("Sending cart data:", cartData);

                // 3. POST to the Cloudflare Function
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart: cartData })
                });

                // 4. Handle 404 or other errors
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server Error (Status ${response.status}). Details: ${errorText}`);
                }

                const result = await response.json();
                window.location.href = result.url;

            } catch (err) {
                console.error("Checkout failed:", err);
                alert("Error: " + err.message);
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = "Checkout Now";
            }
        };
    });
    </script>
</body>
</html>
