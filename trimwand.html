<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Six: TrimWand</title>

    <!-- Standard Tab Icon (32x32) -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

    <!-- Smaller Tab Icon (16x16) -->
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

    <!-- Apple Touch Icon (For when someone saves your site to an iPhone home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <style>
        body {
            margin: 3px;
            background-color: #fcfdfd;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
        }

        .table-container {
            width: 100%;
            max-width: 720px; 
            height: 100dvh;      
            overflow-y: auto;
            border: 1px solid #cfd8dc;
            position: relative; 
            padding: 0;
        }

        /* The Menu Wrapper */
        .menu-wrapper {
            position: sticky;
            top: 0px;
            z-index: 20;
            width: 100%;
            aspect-ratio: 1920/425;
            background-color: #fff;
        }

        .menu-wrapper img {
            width: 100%;
            display: block;
        }

        /* The Invisible Link Hotboxes */
        .menu-link {
            position: absolute;
            display: block;
            cursor: pointer;
        }

        /* Row 1 position */
        .row-1 { top: 0%; height: 55%; }
        
        /* Row 2 position */
        .row-2 { top: 55%; height: 45%; }

        /* Section Spacing & Scroll Buffer */
        .page-section {
            width: 100%;
            display: block;
            margin-bottom: 100px; /* Consistent spacing between sections */
            scroll-margin-top: 160px; /* Prevents sticky menu from covering titles */
        }

        .home {
            width: 100%;
            display: block;
        }

        /* Spacing for elements within a section (like products) */
        .item-spacer {
            height: 60px;
        }

        .comparison-section {
            width: 100%;
            display: block;
            position: relative; 
        }

        .sticky-header {
            position: sticky;
            top: calc(100% / 8.6); 
            z-index: 10;
            width: 100%;
            height: auto;
            display: block;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <div class="table-container">
        <div class="menu-wrapper">
            <img src="Trimwand.menu.webp" alt="Main Menu">
            
            <!-- ROW 1 (Coordinates preserved) -->
            <a href="index.html" class="menu-link row-1" style="left: 0%;   width: 12%;"></a>
            <a href="parasol.html" class="menu-link row-1" style="left: 12%;   width: 21%;"></a>
            <a href="trimwand.html" class="menu-link row-1" style="left: 33%;  width: 21%;"></a>
            <a href="moonbeam.html" class="menu-link row-1" style="left: 54%;  width: 22%;"></a>
            <a href="other.html" class="menu-link row-1" style="left: 76%;  width: 13%;"></a>
            <a href="cart.html"  class="menu-link row-1" style="left: 89%;  width: 11%;"></a>

            <!-- ROW 2 (Coordinates preserved) -->
            <a href="index.html"  class="menu-link row-2" style="left: 0%;   width: 12%;"></a>
        </div>

        <!-- Content -->
        <div id="overview" class="page-section">
            <img src="Trimwand.webp" alt="Trimwand" class="home">
        </div>
        

    </div>

</body>
</html>
