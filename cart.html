<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | danielsix.com</title>
    <!-- Your existing CSS link here -->
</head>
<body>
    <!-- Your existing Header/Nav here -->

    <main>
        <h1>Your Cart</h1>
        <div id="cart-container">
            <!-- Your cart items display here -->
        </div>

        <!-- THIS BUTTON ID IS CRITICAL -->
        <button id="checkout-button">Checkout</button>
    </main>

    <script>
    /**
     * THE FIX: We wrap everything in DOMContentLoaded to prevent the 'null' error.
     * We also check response.ok to prevent the 'Unexpected end of JSON' error.
     */
    document.addEventListener('DOMContentLoaded', () => {
        const checkoutBtn = document.getElementById('checkout-button');

        if (!checkoutBtn) {
            console.error("Critical: #checkout-button not found in the HTML.");
            return;
        }

        checkoutBtn.onclick = async () => {
            try {
                // UI Feedback
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = "Connecting to Stripe...";

                // 1. Parse the cart data from your URL
                const urlParams = new URLSearchParams(window.location.search);
                const dataStr = urlParams.get('data'); 
                
                if (!dataStr) {
                    alert("Your cart is empty.");
                    checkoutBtn.disabled = false;
                    checkoutBtn.innerText = "Checkout";
                    return;
                }

                // Format: Name:PriceID:Qty (e.g., Parasol-18:price_1TU...:1)
                const parts = dataStr.split(':');
                const cartData = [{
                    priceId: parts[1],
                    qty: parseInt(parts[2]) || 1
                }];

                // 2. Call the Cloudflare Function
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart: cartData })
                });

                // 3. Robust Error Handling
                if (!response.ok) {
                    const errorText = await response.text();
                    let msg = "Server Error";
                    try {
                        const json = JSON.parse(errorText);
                        msg = json.error || msg;
                    } catch (e) {
                        msg = errorText; // Use raw text if not JSON (prevents SyntaxError)
                    }
                    throw new Error(msg);
                }

                // 4. Redirect to Stripe
                const session = await response.json();
                window.location.href = session.url;

            } catch (err) {
                console.error("Checkout failed:", err);
                alert("Checkout Error: " + err.message);
                
                // Reset button
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = "Checkout";
            }
        };
    });
    </script>
</body>
</html>
