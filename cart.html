<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | danielsix.com</title>
</head>
<body>
    <h1>Checkout</h1>
    <button id="checkout-button">Checkout Now</button>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const checkoutBtn = document.getElementById('checkout-button');
        if (!checkoutBtn) return;

        checkoutBtn.onclick = async () => {
            console.log("Button clicked. Preparing cart data...");
            try {
                checkoutBtn.disabled = true;
                checkoutBtn.innerText = "Connecting to Stripe...";

                // 1. Get the data from the URL
                const urlParams = new URLSearchParams(window.location.search);
                const dataStr = urlParams.get('data'); 
                
                if (!dataStr) throw new Error("No cart data found in URL.");

                // 2. Parse multi-item format (handles commas for multiple products)
                // Format expected: Name:PriceID:Qty,Name:PriceID:Qty
                const cartData = dataStr.split(',').map(itemStr => {
                    const parts = itemStr.split(':');
                    return {
                        priceId: parts[1].trim(),
                        qty: parseInt(parts[2]) || 1
                    };
                });

                console.log("Sending cart data to server:", cartData);

                // 3. POST to the Cloudflare Function
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cart: cartData })
                });

                // 4. Check for 404 or other errors
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server returned 404/500. Ensure /functions folder exists. Details: ${errorText}`);
                }

                // 5. Redirect to Stripe
                const result = await response.json();
                console.log("Redirecting to:", result.url);
                window.location.href = result.url;

            } catch (err) {
                console.error("Checkout failed:", err);
                alert("Error: " + err.message);
                checkoutBtn.disabled = false;
                checkoutBtn.innerText = "Checkout Now";
            }
        };
    });
    </script>
</body>
</html>
